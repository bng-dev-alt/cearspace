<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a4d47"/>
      <stop offset="0.35" stop-color="#0e7a70"/>
      <stop offset="0.65" stop-color="#17a99a"/>
      <stop offset="1" stop-color="#3fd0bd"/>
    </linearGradient>
    <radialGradient id="lagoon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#9af0e2" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#9af0e2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shallow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5fe6d1" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#5fe6d1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="deep" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#063f3a" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#063f3a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sand" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f2e8cf"/>
      <stop offset="0.7" stop-color="#e6d5a8" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#e6d5a8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="foliage" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3f7a52"/>
      <stop offset="0.75" stop-color="#2f5f42"/>
      <stop offset="1" stop-color="#2f5f42" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="softer" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="softest" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Base ocean -->
  <rect width="1200" height="600" fill="url(#water)"/>

  <!-- Deep-water pockets -->
  <ellipse cx="180" cy="120" rx="360" ry="230" fill="url(#deep)" filter="url(#softer)"/>
  <ellipse cx="1050" cy="520" rx="320" ry="220" fill="url(#deep)" filter="url(#softer)"/>

  <!-- Shallow turquoise sweeps -->
  <ellipse cx="760" cy="200" rx="420" ry="260" fill="url(#shallow)" filter="url(#softer)"/>
  <ellipse cx="520" cy="470" rx="380" ry="220" fill="url(#shallow)" filter="url(#softer)"/>

  <!-- Bright lagoon light around the island -->
  <ellipse cx="720" cy="320" rx="330" ry="220" fill="url(#lagoon)" filter="url(#soft)"/>

  <!-- Island: sand ring + foliage -->
  <ellipse cx="720" cy="320" rx="205" ry="150" fill="url(#sand)" filter="url(#soft)"/>
  <ellipse cx="720" cy="315" rx="128" ry="92" fill="url(#foliage)" filter="url(#soft)"/>

  <!-- Wave / caustic streaks -->
  <g opacity="0.35" filter="url(#softest)">
    <ellipse cx="300" cy="330" rx="220" ry="16" fill="#eafffb"/>
    <ellipse cx="980" cy="150" rx="180" ry="12" fill="#eafffb"/>
    <ellipse cx="450" cy="90" rx="160" ry="10" fill="#eafffb"/>
  </g>
</svg>
